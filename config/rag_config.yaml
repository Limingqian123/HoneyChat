# config/rag_config.yaml
# HoneyChat RAG 引擎配置文件
# 此文件中的配置将被默认值覆盖，环境变量具有最高优先级

# 服务基础配置
service_name: "honeychat-rag-engine"      # 服务名称
log_level: "INFO"                          # 日志级别: DEBUG, INFO, WARNING, ERROR

# API 服务配置
host: "0.0.0.0"                            # 监听地址
port: 8000                                  # 监听端口

# 模型配置
# 远程模型配置（优先使用，速度更快）
use_remote_model: false                      # 是否使用远程模型（如 DeepSeek API）
remote_api_key: ""                           # 远程模型 API 密钥
remote_api_base: "https://api.deepseek.com/v1"  # 远程模型 API 基础 URL
remote_model: "deepseek-chat"                # 远程模型名称

# 本地模型配置
model_path: "/app/models/model.bin"         # GGUF 模型文件路径
model_n_ctx: 2048                           # 上下文窗口大小
model_n_threads: 4                           # 推理线程数 (设为 null 表示自动)
model_n_batch: 512                           # 批处理大小
model_use_mlock: false                       # 是否锁定内存
model_use_mmap: true                         # 是否使用内存映射

# 向量数据库配置
vector_db_path: "/app/chroma_db"             # ChromaDB 持久化路径
vector_db_collection: "command_pairs"        # 集合名称
embedding_model: "all-MiniLM-L6-v2"          # 嵌入模型名称
top_k: 3                                      # 检索数量

# 数据文件配置（用于初始化）
data_file: "/app/data/command_pairs.json"    # 初始命令-输出对 JSON 文件

# 生成参数
max_tokens: 256                               # 最大生成 token 数
temperature: 0.7                              # 温度
top_p: 0.9                                     # Top-p 采样
repeat_penalty: 1.1                            # 重复惩罚